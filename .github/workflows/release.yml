name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build browser packages
        run: |
          mkdir -p dist
          cd extension
          zip -r ../dist/chrome.zip . -x "config.local.json"
          zip -r ../dist/firefox.zip . -x "config.local.json"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            dist/chrome.zip \
            dist/firefox.zip
